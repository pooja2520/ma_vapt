<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAPT Scanner Pro - Sign Up</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<style>
:root { --blue:#2563EB; --blue-dark:#1d4ed8; --blue-light:#EFF6FF; --text:#1e293b; --text-muted:#64748b; --border:#e2e8f0; --bg:#f1f5f9; --white:#fff; --red:#ef4444; --green:#22c55e; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <i class="fa-solid fa-shield-halved"></i>
    <h1>Advanced VAPT Scanner Pro</h1>
    <p>Create your account</p>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="{{ 'success-msg' if category == 'info' else 'error-msg' }}" style="display:flex;">
      <i class="fa-solid {{ 'fa-circle-check' if category == 'info' else 'fa-circle-exclamation' }}"></i>&nbsp;{{ message }}
    </div>
    {% endfor %}
    {% endwith %}
    <form method="POST" action="/signup">
      <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" autocomplete="name" required minlength="2" maxlength="255">
      </div>
      <div class="form-group">
        <label><i class="fa-regular fa-envelope"></i> Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Password</label>
        <div class="pass-wrap">
          <input type="password" id="password" name="password" placeholder="Create a password (min 8 chars)" autocomplete="new-password" required minlength="8">
          <button type="button" onclick="togglePass()"><i class="fa-regular fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Confirm Password</label>
        <div class="pass-wrap">
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" autocomplete="new-password" required minlength="8">
          <button type="button" onclick="toggleConfirmPass()"><i class="fa-regular fa-eye" id="eyeIcon2"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-primary"><i class="fa-solid fa-user-plus"></i> Create Account</button>
    </form>
    <div class="signup-note">Already have an account? <a href="{{ url_for('index') }}">Sign in</a></div>
    <div class="secure-note"><i class="fa-solid fa-lock"></i> Your data is encrypted and secure</div>
  </div>
</div>
<script>
function togglePass() {
  const p = document.getElementById('password');
  const i = document.getElementById('eyeIcon');
  p.type = p.type === 'password' ? 'text' : 'password';
  i.className = p.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
}
function toggleConfirmPass() {
  const p = document.getElementById('confirm_password');
  const i = document.getElementById('eyeIcon2');
  p.type = p.type === 'password' ? 'text' : 'password';
  i.className = p.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
}
document.querySelector('form').addEventListener('submit', function(e) {
  const p = document.getElementById('password');
  const cp = document.getElementById('confirm_password');
  if (p.value !== cp.value) {
    e.preventDefault();
    alert('Passwords do not match. Please try again.');
    cp.focus();
  }
});
</script>
</body>
</html>
