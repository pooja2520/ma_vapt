<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAPT Scanner Pro - Reset Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<style>
:root { --blue:#2563EB; --blue-dark:#1d4ed8; --blue-light:#EFF6FF; --text:#1e293b; --text-muted:#64748b; --border:#e2e8f0; --bg:#f1f5f9; --white:#fff; --green:#22c55e; --red:#ef4444; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
.error-msg { background:#fef2f2; border:1px solid #fecaca; color:var(--red); padding:.75rem 1rem; border-radius:8px; font-size:.875rem; margin-bottom:1rem; display:none; align-items:center; gap:.5rem; }
.error-msg.show { display:flex; }
.btn-primary:disabled { opacity:0.7; cursor:not-allowed; }
</style>
</head>
<body>
<a href="{{ url_for('index') }}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
<div class="box">
  <div class="box-header">
    <i class="fa-solid fa-shield-halved"></i>
    <h1>Reset Password</h1>
    <p>We'll send a verification code to your email</p>
  </div>
  <div class="box-body">
    <div id="errorMsg" class="error-msg">
      <i class="fa-solid fa-circle-exclamation"></i><span id="errorText"></span>
    </div>
    <div class="form-group">
      <label><i class="fa-regular fa-envelope"></i> Email Address</label>
      <input type="email" id="email" placeholder="Enter your registered email" autocomplete="email">
    </div>
    <button class="btn-primary" id="sendBtn" onclick="sendReset()"><i class="fa-solid fa-paper-plane"></i> Send verification code</button>
    <div class="secure-note"><i class="fa-solid fa-lock"></i> Protected by enterprise-grade security</div>
  </div>
</div>
<script>
function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
function sendReset() {
  hideError();
  const email = document.getElementById('email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showError('Please enter a valid email address.');
    return;
  }
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
  fetch('{{ url_for("forgot_password_send_otp") }}', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email })
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        window.location.href = '{{ url_for("reset_password_page") }}?email=' + encodeURIComponent(email);
      } else {
        showError(data.error || 'Failed to send code. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send verification code';
      }
    })
    .catch(() => {
      showError('Could not send verification code. Please try again.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send verification code';
    });
}
</script>
</body>
</html>
